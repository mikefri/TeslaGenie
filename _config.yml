# Informations globales
title: "TeslaGuide — Le guide Tesla en français"
description: "Guides, comparatifs et conseils pour acheter et utiliser une Tesla en France. Modèles, recharge, coûts, parrainage."
url: "https://mikefri.github.io"
baseurl: "/TeslaGuide"
lang: fr
author: "Michael"

# Paramètres SEO et réseaux sociaux
twitter:
  username: "votre_pseudo"
logo: "/assets/img/logo.png"

# Paramètres personnalisés
referral_link: "https://ts.la/michael618693"

# Build
markdown: kramdown
permalink: /:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2  # <--- Ajouté ici

# Configuration de la pagination
pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  title: ':title - page :num'

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
